# https://github.com/10up/action-wordpress-plugin-deploy

# This Action commits the contents of your Git tag to the WordPress.org plugin repository using the same tag name.
# It can exclude files as defined in either .distignore or .gitattributes, and moves anything from a .wordpress-org
# subdirectory to the top-level assets directory in Subversion (plugin banners, icons, and screenshots).

name: Deploy to WordPress.org
on:
  release:
    types: [ released ]
  # Allow manual triggering of the workflow.
  workflow_dispatch:

# Serialise WordPress.org SVN deploys so two concurrent releases cannot push
# to the same repository at once. Do not cancel an in-progress run, since it
# may already be partway through committing tag content.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: New release to WordPress.org
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      - name: Build assets
        run: |
          npm ci
          npm run build
      - name: Push to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # 2.3.0
        env:
          SLUG: plugin-slug # Change this
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        continue-on-error: true # Remove for real plugin
